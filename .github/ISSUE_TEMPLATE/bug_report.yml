# Structurally synced with script.easytv/.github/ISSUE_TEMPLATE/bug_report.yml. Keep parallel.
name: Bug Report
description: Report a bug or unexpected behavior in EasyMovie
labels: ["bug"]
body:
  - type: input
    id: addon-version
    attributes:
      label: EasyMovie version
      description: Add-ons, then My Add-ons, then EasyMovie
      placeholder: e.g. 1.0.1
    validations:
      required: true

  - type: input
    id: kodi-version
    attributes:
      label: Kodi version
      placeholder: e.g. 21.1 Omega
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: Platform / OS
      placeholder: e.g. Windows 11, LibreELEC 12, Android 14, macOS 14
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: log
    attributes:
      label: Log output
      description: |
        1. Settings → Advanced → enable "Write debug log"
        2. Reproduce the issue
        3. Attach `Kodi/userdata/addon_data/script.easymovie/logs/easymovie.log` or paste the relevant section below
      render: text
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      value: |
        Did this work in a previous version of EasyMovie? If yes, which version did it last work in?
        Are you using the Filter Wizard, Browse Mode, or Movie Sets handling? Any other relevant settings?
        Anything else that might help us reproduce this?
    validations:
      required: false
